<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Йога с Азизе</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #eef1ec;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      text-align: center;
      padding: 14px 18px 10px;
      border-radius: 0;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.05);
    }

    .profile-img {
      display: block;
      width: 132px;
      height: 132px;
      margin: 0 auto 10px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid #7a9978;
    }

    h1 {
      margin: 4px 0 4px;
      font-size: 22px;
      line-height: 1.15;
      color: #333333;
    }

    .subtitle {
      margin: 0 0 6px;
      font-size: 14px;
      color: #666666;
    }

    .tagline {
      margin: 0 0 12px;
      font-size: 13px;
      line-height: 1.3;
      color: #777777;
    }

    .button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px 14px;
      background: #869a80;
      color: #ffffff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      border-radius: 999px;
      box-shadow: 0 4px 10px rgba(127, 146, 122, 0.18);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .button:hover {
      opacity: 0.96;
    }

    .button:active {
      transform: scale(0.985);
      box-shadow: 0 2px 6px rgba(127, 146, 122, 0.14);
    }

    @media (max-height: 760px) {
      .container {
        padding: 12px 16px 8px;
      }

      .profile-img {
        width: 120px;
        height: 120px;
        margin-bottom: 8px;
      }

      h1 {
        font-size: 20px;
        margin-bottom: 2px;
      }

      .subtitle {
        font-size: 13px;
        margin-bottom: 4px;
      }

      .tagline {
        font-size: 12px;
        margin-bottom: 10px;
      }

      .button {
        padding: 11px 12px;
        margin: 7px 0;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="azize-profile.png" alt="Йога с Азизе" class="profile-img" />

    <h1>Йога с Азизе</h1>

    <div class="subtitle">Hatha · Yin · Soundbath</div>

    <div class="tagline">
      място, където тялото почива,<br>
      а душата се събужда
    </div>

    <a class="button" href="https://www.facebook.com/share/17JUXpwfdC/" target="_blank" rel="noopener">
      Facebook
    </a>

    <a class="button" href="https://www.instagram.com/yoga.azize/" target="_blank" rel="noopener">
      Instagram
    </a>

    <a class="button" href="https://invite.viber.com/?g2=AQAFdclileRBfVW7%2FZ9wPyFaTdt%2BKzZdpDyQVsvCp0yamUv6HptSyb%2BxeD4LqFAF" target="_blank" rel="noopener">
      Viber
    </a>

    <a class="button" href="grafik-maxifit.png" target="_blank" rel="noopener">
      График Maxifit
    </a>

    <a class="button" href="grafik-slowflow.png" target="_blank" rel="noopener">
      График Flow Soul
    </a>

    <a class="button" href="events.html" rel="noopener">
      Събития
    </a>

    <a class="button" href="https://forms.gle/BxWqUGx8CQMSdvXC8" target="_blank" rel="noopener">
      Запиши се за следващо събитие
    </a>
  </div>
</body>
</html>
