<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Йога с Азизе</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 24px;
      padding: 30px 20px 40px;
      box-sizing: border-box;
      text-align: center;
      margin: 20px;
    }

    .profile-img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 6px solid #7a9978;
      object-fit: cover;
      margin-bottom: 20px;
    }

    h1 {
      margin: 10px 0 5px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 5px;
    }

    .description {
      color: #888;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      margin-bottom: 16px;
      background: #7a9978;
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="container">

    <img src="YOUR_IMAGE_LINK_HERE" class="profile-img">

    <h1>Йога с Азизе</h1>
    <div class="subtitle">Hatha · Yin · Soundbath</div>
    <div class="description">
      място, където тялото почива,<br>
      а душата се събужда
    </div>

    <a href="#" class="btn">Facebook страница</a>
    <a href="#" class="btn">Instagram страница</a>
    <a href="#" class="btn">Viber канал</a>
    <a href="#" class="btn">График Maxifit</a>
    <a href="#" class="btn">График Flow Soul space</a>

  </div>
</body>
</html>
