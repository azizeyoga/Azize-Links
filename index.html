<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Йога с Азизе</title>

  <style>
    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      padding:0;
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      overflow-x:hidden;
    }

    body{
      display:flex;
      justify-content:center;
    }

    .container{
      width:100%;
      max-width:520px;
      min-height:100vh;
      margin:0 auto;
      background:#ffffff;
      padding:16px 20px 20px;
      text-align:center;
    }

    img{
      display:block;
      width:128px;
      height:128px;
      object-fit:cover;
      border-radius:50%;
      border:4px solid #7a9978;
      margin:0 auto 12px auto;
    }

    h1{
      font-size:24px;
      margin:6px 0 4px;
      color:#333333;
    }

    .subtitle{
      font-size:15px;
      color:#666666;
      margin-bottom:8px;
    }

    .tagline{
      font-size:14px;
      color:#777777;
      margin-bottom:16px;
      line-height:1.35;
    }

    .button{
      display:block;
      width:100%;
      padding:13px 16px;
      margin:10px 0;
      background:#7a9978;
      color:#ffffff;
      text-decoration:none;
      border-radius:35px;
      font-weight:bold;
      font-size:15px;
      transition:0.2s;
    }

    .button:hover{
      opacity:0.88;
    }

    @media (max-width: 480px){
      .container{
        padding:14px 16px 18px;
      }

      img{
        width:118px;
        height:118px;
      }

      h1{
        font-size:22px;
      }

      .subtitle{
        font-size:14px;
      }

      .tagline{
        font-size:13px;
        margin-bottom:14px;
      }

      .button{
        padding:12px 14px;
        margin:9px 0;
        font-size:14px;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <img src="azize-profile.png" alt="Йога с Азизе" />

    <h1>Йога с Азизе</h1>
    <div class="subtitle">Hatha · Yin · Soundbath</div>

    <div class="tagline">
      място, където тялото почива,<br>
      а душата се събужда
    </div>

    <a class="button" href="https://www.facebook.com/share/17JUXpwfdC/" target="_blank" rel="noopener">
      Facebook страница
    </a>

    <a class="button" href="https://www.instagram.com/yoga.azize/" target="_blank" rel="noopener">
      Instagram страница
    </a>

    <a class="button" href="https://invite.viber.com/?g2=AQAFdclileRBfVW7%2FZ9wPyFaTdt%2BKzZdpDyQVsvCp0yamUv6HptSyb%2BxeD4LqFAF" target="_blank" rel="noopener">
      Viber канал
    </a>

    <a class="button" href="events.html">
      Събития
    </a>

    <a class="button" href="grafik-maxifit.png" target="_blank" rel="noopener">
      График Maxifit
    </a>

    <a class="button" href="grafik-slowflow.png" target="_blank" rel="noopener">

  </div>
</body>
</html>
