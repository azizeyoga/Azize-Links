<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Йога с Азизе</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef1ec;
      color: #2f2f2f;
    }

    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 16px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: #f9f9f7;
      border-radius: 28px;
      padding: 34px 26px 28px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    .profile-img {
      display: block;
      width: 150px;
      height: 150px;
      margin: 0 auto 18px;
      object-fit: cover;
      border-radius: 50%;
      border: 5px solid #8aa184;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.15;
      font-weight: 700;
      color: #2f2f2f;
    }

    .subtitle {
      margin: 0 0 12px;
      font-size: 16px;
      color: #5f5f5f;
    }

    .tagline {
      margin: 0 0 24px;
      font-size: 15px;
      line-height: 1.45;
      color: #6f6f6f;
    }

    .button {
      display: block;
      width: 100%;
      margin: 12px 0;
      padding: 16px 18px;
      background: linear-gradient(180deg, #9caf94 0%, #879b80 100%);
      color: #ffffff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      border-radius: 999px;
      box-shadow: 0 6px 14px rgba(135, 155, 128, 0.22);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .button:hover {
      opacity: 0.97;
    }

    .button:active {
      transform: scale(0.985);
      box-shadow: 0 3px 8px rgba(135, 155, 128, 0.18);
    }

    @media (max-width: 480px) {
      .page {
        padding: 18px 12px;
      }

      .card {
        padding: 26px 18px 22px;
        border-radius: 22px;
      }

      .profile-img {
        width: 132px;
        height: 132px;
        margin-bottom: 16px;
      }

      h1 {
        font-size: 24px;
      }

      .subtitle {
        font-size: 15px;
        margin-bottom: 10px;
      }

      .tagline {
        font-size: 14px;
        margin-bottom: 20px;
      }

      .button {
        margin: 10px 0;
        padding: 15px 16px;
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="card">
      <img src="azize-profile.png" alt="Йога с Азизе" class="profile-img" />

      <h1>Йога с Азизе</h1>

      <div class="subtitle">Hatha · Yin · Soundbath</div>

      <div class="tagline">
        място, където тялото почива,<br>
        а душата се събужда
      </div>

      <a class="button" href="https://www.facebook.com/share/17JUXpwfdC/" target="_blank" rel="noopener">
        Facebook
      </a>

      <a class="button" href="https://www.instagram.com/yoga.azize/" target="_blank" rel="noopener">
        Instagram
      </a>

      <a class="button" href="https://invite.viber.com/?g2=AQAFdclileRBfVW7%2FZ9wPyFaTdt%2BKzZdpDyQVsvCp0yamUv6HptSyb%2BxeD4LqFAF" target="_blank" rel="noopener">
        Viber
      </a>

      <a class="button" href="grafik-maxifit.png" target="_blank" rel="noopener">
        График Maxifit
      </a>

      <a class="button" href="grafik-slowflow.png" target="_blank" rel="noopener">
        График Flow Soul
      </a>

      <a class="button" href="events.html" rel="noopener">
        Събития
      </a>

      <a class="button" href="https://forms.gle/BxWqUGx8CQMSdvXC8" target="_blank" rel="noopener">
        Запиши се за следващо събитие
      </a>
    </div>
  </div>
</body>
</html>
